<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cálculo Descuento Especial</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />

<style>
:root {
  --cyan:#00c2ff;
  --teal:#00ffc8;
  --red:#ff4e6a;
  --amber:#ffb347;
  --bg:#0b0f1a;
  --s800:#0d1525;
  --s700:#131929;
  --s600:#1a2236;
  --s500:#1e3050;
  --text:#e8edf5;
  --muted:#5a7090;
}

body{
  font-family:'Barlow',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
}

.font-display{font-family:'Rajdhani',sans-serif;}

.custom-input{
  width:100%;
  background:var(--s800);
  border:1px solid var(--s500);
  border-radius:12px;
  color:var(--text);
  font-family:'Rajdhani';
  font-size:clamp(1rem,3.5vw,1.4rem);
  padding:14px 44px 14px 14px;
  min-height:52px;
}

.custom-input:focus{
  border-color:var(--cyan);
  box-shadow:0 0 0 3px rgba(0,194,255,.15);
}

.iva-btn{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--s500);
  color:var(--muted);
  font-family:'Rajdhani';
  font-weight:600;
}

.iva-btn.active{
  border-color:var(--cyan);
  color:var(--cyan);
  background:rgba(0,194,255,.1);
}

.result-text{
  word-break:break-word;
  overflow-wrap:anywhere;
}

/* SweetAlert estilo */
.swal2-popup{
  background:#131929 !important;
  border-radius:18px !important;
  border:1px solid rgba(0,194,255,.2) !important;
}

.swal2-confirm{
  background:linear-gradient(135deg,#00c2ff,#00ffc8)!important;
  color:#000!important;
}
</style>
</head>

<body class="pb-10">

<header class="bg-[#0d1525] border-b border-[#1e3050]">
<div class="max-w-6xl mx-auto px-4 py-4 flex items-center gap-3">
<div class="w-10 h-10 border border-cyan-400 flex items-center justify-center rounded-lg">
<span class="font-display text-cyan-400 font-bold">%</span>
</div>
<div>
<h1 class="font-display text-lg sm:text-2xl font-bold tracking-wide">
<span class="text-cyan-400">Cálculo</span> Descuento Especial
</h1>
<p class="text-xs text-gray-400">Herramienta de margen</p>
</div>
</div>
</header>

<main class="max-w-6xl mx-auto px-4 mt-6">
<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

<!-- INPUT -->
<div class="bg-[#131929] border border-[#1e3050] rounded-2xl p-5">

<div class="mb-5 text-xs uppercase text-cyan-400">Datos</div>

<div class="flex flex-col gap-4">

<div>
<label class="text-xs text-gray-400">% IVA</label>
<div class="flex gap-2 mt-2">
<button class="iva-btn" onclick="selectIva(0)" id="iva0">0%</button>
<button class="iva-btn" onclick="selectIva(15)" id="iva15">15%</button>
</div>
<input type="hidden" id="iva">
</div>

<div>
<label class="text-xs text-gray-400">PVP + IVA</label>
<input id="pvp" type="number" class="custom-input" placeholder="0.00">
</div>

<div>
<label class="text-xs text-gray-400">Costo sin IVA</label>
<input id="costo" type="number" class="custom-input" placeholder="0.00">
</div>

<div>
<label class="text-xs text-gray-400">Utilidad (%)</label>
<input id="utilidad" type="number" class="custom-input" placeholder="0">
</div>

</div>

<button onclick="calcular()" class="mt-5 w-full py-3 rounded-xl bg-gradient-to-r from-cyan-400 to-teal-300 text-black font-bold">
Calcular
</button>

<button onclick="resetear()" class="mt-2 w-full text-sm text-gray-400 border border-[#1e3050] rounded-xl py-2">
Limpiar
</button>

</div>

<!-- RESULTADOS -->
<div class="bg-[#131929] border border-[#1e3050] rounded-2xl p-5 flex flex-col gap-4">

<div class="text-xs uppercase text-cyan-400">Resultados</div>

<div class="bg-[#1a2236] p-4 rounded-xl">

<div class="flex flex-col sm:flex-row justify-between gap-4">

<div>
<p class="text-xs text-gray-400">Descuento</p>
<p id="desc" class="font-display text-[clamp(2rem,8vw,4rem)] result-text">—</p>
</div>

<div class="text-left sm:text-right">
<p class="text-xs text-gray-400">Precio Especial</p>
<p id="precio" class="font-display text-[clamp(1.8rem,6vw,3rem)] result-text">—</p>
</div>

</div>

</div>

<div class="grid grid-cols-2 gap-3">

<div class="bg-[#1a2236] p-3 rounded-xl">
<p class="text-xs text-gray-400">Costo + IVA</p>
<p id="costoiva" class="result-text">—</p>
</div>

<div class="bg-[#1a2236] p-3 rounded-xl">
<p class="text-xs text-gray-400">Rentabilidad</p>
<p id="rentabilidad" class="result-text">—</p>
</div>

</div>

</div>

</div>
</main>

<script>
const Toast = Swal.mixin({
toast:true,
position:'top-end',
showConfirmButton:false,
timer:2500
});

function selectIva(v){
document.getElementById('iva').value=v;
document.getElementById('iva0').classList.toggle('active',v==0);
document.getElementById('iva15').classList.toggle('active',v==15);
}

function fmt(n){return n.toLocaleString('es-EC',{minimumFractionDigits:2});}

function calcular(){

const iva=parseFloat(document.getElementById('iva').value)/100;
const pvp=parseFloat(document.getElementById('pvp').value);
const costo=parseFloat(document.getElementById('costo').value);
const util=parseFloat(document.getElementById('utilidad').value);

if(isNaN(iva)) return Toast.fire({icon:'warning',title:'Selecciona IVA'});
if(isNaN(pvp)||isNaN(costo)) return Toast.fire({icon:'warning',title:'Datos inválidos'});

const costoIVA=costo*(1+iva);
const precio=costoIVA/(1-util/100);
const desc=((pvp-precio)/pvp)*100;

document.getElementById('desc').innerText=fmt(desc)+'%';
document.getElementById('precio').innerText='$'+fmt(precio);
document.getElementById('costoiva').innerText='$'+fmt(costoIVA);
document.getElementById('rentabilidad').innerText=fmt((pvp-costoIVA)/pvp*100)+'%';

Toast.fire({icon:'success',title:'Cálculo listo'});
}

function resetear(){
['pvp','costo','utilidad'].forEach(id=>document.getElementById(id).value='');
['desc','precio','costoiva','rentabilidad'].forEach(id=>document.getElementById(id).innerText='—');
document.getElementById('iva').value='';
document.getElementById('iva0').classList.remove('active');
document.getElementById('iva15').classList.remove('active');
}
</script>

</body>
</html>
