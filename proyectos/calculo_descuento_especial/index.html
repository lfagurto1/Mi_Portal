<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cálculo Descuento Especial</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cyan:  { brand: '#00c2ff' },
            teal:  { brand: '#00ffc8' },
            red:   { brand: '#ff4e6a' },
            amber: { brand: '#ffb347' },
            slate: {
              950: '#0b0f1a',
              925: '#0d1525',
              910: '#131929',
              900: '#1a2236',
              850: '#1e3050',
            }
          },
          fontFamily: {
            display: ['Rajdhani', 'sans-serif'],
            body: ['Barlow', 'sans-serif'],
          },
          boxShadow: {
            neon: '0 0 0 1px rgba(0,194,255,0.12), 0 0 25px rgba(0,194,255,0.08)',
          }
        }
      }
    }
  </script>

  <style>
    :root {
      --cyan:  #00c2ff;
      --teal:  #00ffc8;
      --red:   #ff4e6a;
      --amber: #ffb347;
      --bg:    #0b0f1a;
      --s800:  #0d1525;
      --s700:  #131929;
      --s600:  #1a2236;
      --s500:  #1e3050;
      --text:  #e8edf5;
      --muted: #5a7090;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Barlow', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,194,255,0.07), transparent),
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(30,48,80,0.25) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(30,48,80,0.12) 40px);
    }

    .font-display {
      font-family: 'Rajdhani', sans-serif;
    }

    /* Quitar flechas de input number */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      appearance: none;
      margin: 0;
    }

    input[type=number] {
      -moz-appearance: textfield;
      appearance: textfield;
    }

    .header-glow::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--cyan), var(--teal), transparent);
    }

    .panel-glow::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,194,255,0.25), transparent);
    }

    .hero-glow::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, var(--cyan), var(--teal));
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,194,255,0); }
      50% { box-shadow: 0 0 20px 4px rgba(0,194,255,0.22); }
    }

    .hero-pulse {
      animation: pulse-glow 0.9s ease;
    }

    .bar-fill {
      transition: width 0.5s cubic-bezier(0.25,0.8,0.25,1), background 0.5s;
    }

    .custom-input {
      width: 100%;
      background: var(--s800);
      border: 1px solid var(--s500);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      font-weight: 600;
      padding: 14px 44px 14px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
      min-height: 54px;
    }

    .custom-input::placeholder {
      color: var(--muted);
    }

    .custom-input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(0,194,255,0.10);
      transform: translateY(-1px);
    }

    .glass-card {
      background: rgba(19, 25, 41, 0.92);
      backdrop-filter: blur(8px);
    }

    .result-value {
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .iva-btn {
      flex: 1;
      min-height: 54px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--s500);
      background: var(--s800);
      color: var(--muted);
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .iva-btn:hover {
      border-color: var(--cyan);
      color: var(--text);
      transform: translateY(-1px);
    }

    .iva-btn.active {
      border-color: var(--cyan);
      color: var(--cyan);
      background: rgba(0,194,255,0.10);
      box-shadow: 0 0 0 3px rgba(0,194,255,0.10);
    }

    @media (max-width: 640px) {
      .mobile-tight {
        letter-spacing: 0.12em !important;
      }
    }

    /* Blindaje contra alertas inline viejas */
    #warning-box,
    .warning-box,
    .alert-inline-warning,
    .alert-warning-inline,
    .result-warning,
    .legacy-warning {
      display: none !important;
      visibility: hidden !important;
      opacity: 0 !important;
      height: 0 !important;
      overflow: hidden !important;
      pointer-events: none !important;
    }

    /* SweetAlert2 modal */
    .swal2-popup {
      border-radius: 18px !important;
      background: #131929 !important;
      color: #e8edf5 !important;
      border: 1px solid rgba(0,194,255,0.18) !important;
      box-shadow: 0 0 0 1px rgba(0,194,255,0.08), 0 0 28px rgba(0,194,255,0.08) !important;
    }

    .swal2-title,
    .swal2-html-container {
      color: #e8edf5 !important;
    }

    .swal2-confirm {
      background: linear-gradient(135deg, #00c2ff, #00ffc8) !important;
      color: #0b0f1a !important;
      font-weight: 700 !important;
      border-radius: 10px !important;
    }

    .swal2-cancel {
      border-radius: 10px !important;
    }

    /* Toast pequeño como el primer módulo */
    .swal2-toast {
      padding: 0.85rem 1rem !important;
      border-radius: 16px !important;
      min-height: auto !important;
    }

    .swal2-toast .swal2-title {
      font-size: 0.95rem !important;
      font-weight: 700 !important;
      line-height: 1.25 !important;
      margin: 0 !important;
    }

    .swal2-toast .swal2-icon {
      transform: scale(0.82);
      margin: 0.2em 0.5em 0.2em 0.2em !important;
    }

    .swal2-toast .swal2-timer-progress-bar {
      background: rgba(255,255,255,0.35) !important;
    }
  </style>
</head>

<body class="pb-10 sm:pb-16">
  <!-- HEADER -->
  <header class="relative bg-gradient-to-br from-[#0d1a2e] to-[#0b1520] border-b border-[#1e3050] header-glow overflow-hidden">
    <div
      class="absolute top-[-60px] right-[-60px] w-40 h-40 sm:w-48 sm:h-48 rounded-full"
      style="background: radial-gradient(circle, rgba(0,194,255,0.06) 0%, transparent 70%)">
    </div>

    <div class="relative max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-4 sm:py-5 flex items-center gap-3 sm:gap-4">
      <div class="relative shrink-0 w-10 h-10 sm:w-11 sm:h-11 border border-[#00c2ff] rounded-lg flex items-center justify-center">
        <span class="font-display text-lg sm:text-xl font-bold text-[#00c2ff] relative z-10">%</span>
        <div class="absolute inset-[3px] rounded-md bg-[#00c2ff]/[0.07]"></div>
      </div>

      <div class="min-w-0">
        <h1 class="font-display text-base sm:text-2xl font-bold tracking-[0.12em] sm:tracking-[0.18em] uppercase text-slate-100 leading-tight mobile-tight">
          <span class="text-[#00c2ff]">Cálculo</span> Descuento Especial
        </h1>
        <p class="text-[10px] sm:text-[11px] tracking-[0.14em] sm:tracking-[0.18em] text-[#5a7090] mt-0.5 leading-relaxed">
          Herramienta de margen y precio especial
        </p>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 mt-6 sm:mt-8">
    <div class="grid grid-cols-1 xl:grid-cols-2 gap-5 lg:gap-6 items-start">
      <!-- INPUTS -->
      <section class="relative glass-card border border-[#1e3050] rounded-2xl p-4 sm:p-6 panel-glow overflow-hidden shadow-neon">
        <div class="flex items-center gap-3 mb-5 sm:mb-6">
          <span class="font-display text-[10px] sm:text-[11px] font-semibold tracking-[0.20em] sm:tracking-[0.25em] uppercase text-[#00c2ff]">
            Datos del producto
          </span>
          <span class="flex-1 h-px bg-[#1e3050]"></span>
        </div>

        <div class="flex flex-col gap-4 sm:gap-5">
          <div>
            <label class="block text-[10px] sm:text-[11px] font-medium tracking-[0.12em] sm:tracking-[0.15em] uppercase text-[#5a7090] mb-1.5 leading-relaxed">
              % IVA
            </label>

            <div class="flex gap-2.5">
              <button type="button" class="iva-btn" onclick="selectIva(0)" id="iva0">0%</button>
              <button type="button" class="iva-btn" onclick="selectIva(15)" id="iva15">15%</button>
            </div>
            <input type="hidden" id="iva" />
          </div>

          <div>
            <label class="block text-[10px] sm:text-[11px] font-medium tracking-[0.12em] sm:tracking-[0.15em] uppercase text-[#5a7090] mb-1.5 leading-relaxed">
              PVP + IVA
            </label>
            <div class="relative">
              <input id="pvp" type="number" placeholder="0.00" step="0.01" min="0" class="custom-input" inputmode="decimal" />
              <span class="font-display absolute right-4 top-1/2 -translate-y-1/2 text-sm font-semibold text-[#5a7090] pointer-events-none">$</span>
            </div>
          </div>

          <div>
            <label class="block text-[10px] sm:text-[11px] font-medium tracking-[0.12em] sm:tracking-[0.15em] uppercase text-[#5a7090] mb-1.5 leading-relaxed">
              Costo sin IVA
            </label>
            <div class="relative">
              <input id="costo" type="number" placeholder="0.00" step="0.01" min="0" class="custom-input" inputmode="decimal" />
              <span class="font-display absolute right-4 top-1/2 -translate-y-1/2 text-sm font-semibold text-[#5a7090] pointer-events-none">$</span>
            </div>
          </div>

          <div>
            <label class="block text-[10px] sm:text-[11px] font-medium tracking-[0.12em] sm:tracking-[0.15em] uppercase text-[#5a7090] mb-1.5 leading-relaxed">
              Utilidad a aplicar (%)
            </label>
            <div class="relative">
              <input id="utilidad" type="number" placeholder="0.00" step="0.01" min="0" max="99.99" class="custom-input" inputmode="decimal" />
              <span class="font-display absolute right-4 top-1/2 -translate-y-1/2 text-sm font-semibold text-[#5a7090] pointer-events-none">%</span>
            </div>
          </div>
        </div>

        <div class="mt-6 flex flex-col gap-2.5">
          <button
            type="button"
            onclick="calcular()"
            class="font-display w-full py-3.5 rounded-xl font-bold text-sm tracking-[0.16em] sm:tracking-[0.2em] uppercase text-[#0b0f1a] transition-all hover:opacity-90 active:scale-[0.99]"
            style="background: linear-gradient(135deg, #00c2ff, #00ffc8)">
            Calcular
          </button>

          <button
            type="button"
            onclick="resetear()"
            class="w-full py-3 sm:py-3.5 rounded-xl border border-[#1e3050] text-[#a6b4c8] text-xs sm:text-sm hover:text-slate-100 hover:border-[#5a7090] transition-all bg-[#0f1626]">
            ↺ Limpiar
          </button>
        </div>
      </section>

      <!-- RESULTS -->
      <section class="relative glass-card border border-[#1e3050] rounded-2xl p-4 sm:p-6 panel-glow overflow-hidden flex flex-col gap-4 shadow-neon">
        <div class="flex items-center gap-3">
          <span class="font-display text-[10px] sm:text-[11px] font-semibold tracking-[0.20em] sm:tracking-[0.25em] uppercase text-[#00c2ff]">
            Resultados
          </span>
          <span class="flex-1 h-px bg-[#1e3050]"></span>
        </div>

        <div
          id="hero"
          class="relative hero-glow overflow-hidden rounded-xl px-4 sm:px-6 py-6 sm:py-8"
          style="background: linear-gradient(135deg, rgba(0,194,255,0.07) 0%, rgba(0,255,200,0.04) 100%); border: 1px solid rgba(0,194,255,0.28);">
          <div class="flex flex-col sm:flex-row justify-between gap-5">
            <div class="min-w-0">
              <p class="text-[10px] sm:text-[11px] tracking-[0.18em] sm:tracking-[0.22em] uppercase text-[#5a7090] mb-2">
                Descuento porcentual
              </p>
              <p id="desc" class="font-display font-bold leading-none transition-all text-[#5a7090] result-value" style="font-size: clamp(2.4rem, 10vw, 3rem);">
                —
              </p>
              <p id="descSub" class="text-xs sm:text-sm text-[#5a7090] mt-3 leading-relaxed break-words">
                ingresa los datos y calcula
              </p>
            </div>

            <div class="min-w-0 text-left sm:text-right">
              <p class="text-[10px] sm:text-[11px] tracking-[0.18em] sm:tracking-[0.22em] uppercase text-[#5a7090] mb-2">
                Precio especial + IVA
              </p>
              <p id="precio" class="font-display font-bold leading-none transition-all text-[#5a7090] result-value" style="font-size: clamp(2rem, 7vw, 4rem);">
                —
              </p>
              <p id="precioSub" class="text-xs sm:text-sm text-[#5a7090] mt-3 leading-relaxed break-words">
                &nbsp;
              </p>
            </div>
          </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <div class="rounded-xl p-4 min-w-0" style="background:#1a2236; border:1px solid #1e3050;">
            <p class="text-[9px] sm:text-[10px] tracking-[0.12em] sm:tracking-[0.15em] uppercase text-[#5a7090] mb-1.5">
              Costo + IVA
            </p>
            <p id="costoiva" class="font-display text-xl sm:text-2xl font-bold text-[#5a7090] transition-all result-value">
              —
            </p>
          </div>

          <div class="rounded-xl p-4 min-w-0" style="background:#1a2236; border:1px solid #1e3050;">
            <p class="text-[9px] sm:text-[10px] tracking-[0.12em] sm:tracking-[0.15em] uppercase text-[#5a7090] mb-1.5">
              Rentabilidad
            </p>
            <p id="rentabilidad" class="font-display text-xl sm:text-2xl font-bold text-[#5a7090] transition-all result-value">
              —
            </p>
          </div>
        </div>

        <div class="rounded-xl px-4 py-3.5" style="background:#1a2236; border:1px solid #1e3050;">
          <div class="flex justify-between items-center gap-3 mb-2.5">
            <span class="text-[9px] sm:text-[10px] tracking-[0.12em] sm:tracking-[0.15em] uppercase text-[#5a7090]">
              Margen actual sobre PVP
            </span>
            <span id="rentabilidadBarText" class="font-display text-sm font-semibold text-slate-400 shrink-0">
              —
            </span>
          </div>

          <div class="h-2 rounded-full overflow-hidden" style="background: rgba(255,255,255,0.05);">
            <div id="barFill" class="bar-fill h-full rounded-full w-0" style="background: linear-gradient(90deg,#00c2ff,#00ffc8)"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script>
    function purgeLegacyWarnings() {
      const legacyIds = ['warning-box', 'warning-msg'];
      legacyIds.forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          el.style.display = 'none';
          el.innerHTML = '';
          el.textContent = '';
        }
      });

      const selectors = [
        '.warning-box',
        '.alert-inline-warning',
        '.alert-warning-inline',
        '.result-warning',
        '.legacy-warning'
      ];

      selectors.forEach(selector => {
        document.querySelectorAll(selector).forEach(el => {
          el.style.display = 'none';
          el.innerHTML = '';
          el.textContent = '';
        });
      });

      document.querySelectorAll('div, p, span').forEach(el => {
        const txt = (el.textContent || '').trim();
        if (
          txt.includes('Por favor selecciona el % IVA') ||
          txt.includes('Ingresa valores válidos') ||
          txt.startsWith('⚠')
        ) {
          if (!el.closest('.swal2-container')) {
            el.style.display = 'none';
            el.textContent = '';
            el.innerHTML = '';
          }
        }
      });
    }

    const Toast = Swal.mixin({
      toast: true,
      position: 'top-end',
      showConfirmButton: false,
      timer: 2200,
      timerProgressBar: true
    });

    function fmt(n, dec = 2) {
      return n.toLocaleString('es-EC', {
        minimumFractionDigits: dec,
        maximumFractionDigits: dec
      });
    }

    function showAlert(title, message, icon = 'error') {
      purgeLegacyWarnings();
      Swal.fire({
        icon: icon,
        title: title,
        html: message,
        confirmButtonText: 'Entendido',
        allowOutsideClick: true,
        allowEscapeKey: true
      });
    }

    function showSuccessToast(message) {
      purgeLegacyWarnings();
      Toast.fire({
        icon: 'success',
        title: message
      });
    }

    function selectIva(v) {
      purgeLegacyWarnings();
      document.getElementById('iva').value = v;
      document.getElementById('iva0').classList.toggle('active', v === 0);
      document.getElementById('iva15').classList.toggle('active', v === 15);
    }

    function calcular() {
      purgeLegacyWarnings();

      const ivaRaw = document.getElementById('iva').value.trim();
      const pvpRaw = document.getElementById('pvp').value.trim();
      const costoRaw = document.getElementById('costo').value.trim();
      const utilRaw = document.getElementById('utilidad').value.trim();

      if (ivaRaw === '') {
        showAlert('Datos incompletos', 'Por favor selecciona el <b>% IVA</b> (0% o 15%).', 'error');
        return;
      }

      if (pvpRaw === '') {
        showAlert('Datos incompletos', 'Ingresa un valor para <b>PVP + IVA</b>.', 'error');
        return;
      }

      if (costoRaw === '') {
        showAlert('Datos incompletos', 'Ingresa un valor para <b>Costo sin IVA</b>.', 'error');
        return;
      }

      if (utilRaw === '') {
        showAlert('Datos incompletos', 'Ingresa un valor para <b>Utilidad a aplicar</b>.', 'error');
        return;
      }

      const pvp = parseFloat(pvpRaw);
      const costo = parseFloat(costoRaw);
      const util = parseFloat(utilRaw);

      if (isNaN(pvp) || pvp <= 0) {
        showAlert('Datos inválidos', 'Ingresa un valor válido para <b>PVP + IVA</b>.', 'error');
        return;
      }

      if (isNaN(costo) || costo <= 0) {
        showAlert('Datos inválidos', 'Ingresa un valor válido para <b>Costo sin IVA</b>.', 'error');
        return;
      }

      if (isNaN(util) || util <= 0 || util >= 100) {
        showAlert('Datos inválidos', 'Ingresa un valor válido para <b>Utilidad a aplicar</b>. Debe ser mayor a 0 y menor a 100.', 'error');
        return;
      }

      const iva = parseFloat(ivaRaw) / 100;
      const costoIVA = costo * (1 + iva);
      const precio = costoIVA / (1 - util / 100);
      const desc = ((pvp - precio) / pvp) * 100;
      const rent = ((pvp - costoIVA) / pvp) * 100;

      document.getElementById('desc').textContent = `${fmt(desc)}%`;
      document.getElementById('precio').textContent = `$${fmt(precio)}`;
      document.getElementById('costoiva').textContent = `$${fmt(costoIVA)}`;
      document.getElementById('rentabilidad').textContent = `${fmt(rent)}%`;
      document.getElementById('rentabilidadBarText').textContent = `${fmt(rent)}%`;

      document.getElementById('descSub').textContent = 'Descuento a aplicar sobre PVP';
      document.getElementById('precioSub').textContent = 'Precio calculado con utilidad aplicada';

      document.getElementById('desc').style.color = '#00c2ff';
      document.getElementById('precio').style.color = '#00ffc8';
      document.getElementById('costoiva').style.color = '#e8edf5';
      document.getElementById('rentabilidad').style.color = rent >= util ? '#00ffc8' : '#ffb347';

      const pct = Math.max(0, Math.min(100, rent));
      const barFill = document.getElementById('barFill');
      barFill.style.width = pct + '%';
      barFill.style.background = rent >= util
        ? 'linear-gradient(90deg,#00c2ff,#00ffc8)'
        : 'linear-gradient(90deg,#ffb347,#ff4e6a)';

      const hero = document.getElementById('hero');
      hero.classList.remove('hero-pulse');
      void hero.offsetWidth;
      hero.classList.add('hero-pulse');

      showSuccessToast('Cálculo realizado correctamente');
    }

    function resetear() {
      ['pvp', 'costo', 'utilidad'].forEach(id => {
        document.getElementById(id).value = '';
      });

      ['desc', 'precio', 'costoiva', 'rentabilidad', 'rentabilidadBarText'].forEach(id => {
        document.getElementById(id).textContent = '—';
      });

      document.getElementById('desc').style.color = '#5a7090';
      document.getElementById('precio').style.color = '#5a7090';
      document.getElementById('costoiva').style.color = '#5a7090';
      document.getElementById('rentabilidad').style.color = '#5a7090';

      document.getElementById('descSub').textContent = 'ingresa los datos y calcula';
      document.getElementById('precioSub').innerHTML = '&nbsp;';
      document.getElementById('iva').value = '';
      document.getElementById('iva0').classList.remove('active');
      document.getElementById('iva15').classList.remove('active');

      document.getElementById('barFill').style.width = '0%';
      document.getElementById('barFill').style.background = 'linear-gradient(90deg,#00c2ff,#00ffc8)';

      purgeLegacyWarnings();
      showSuccessToast('Formulario limpiado');
      document.getElementById('pvp').focus();
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        calcular();
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      purgeLegacyWarnings();
    });
  </script>
</body>
</html>
